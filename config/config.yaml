# ============================================================
# Failure-Aware RAG — Master Configuration
# ============================================================
# RTX 6000 Pro (40 GB VRAM) — Mistral-7B (4-bit) recommended

# ── Retrieval ────────────────────────────────────────────────
retrieval:
  encoder_model: "sentence-transformers/all-MiniLM-L6-v2"
  top_k: 5                          # documents returned per query
  index_path: "data/faiss.index"
  corpus_path: "data/corpus.jsonl"
  embedding_dim: 384

# ── Generation ───────────────────────────────────────────────
#
#   Model options by GPU VRAM:
#   ┌─────────────────────────────────────────────┬──────────┐
#   │ mistralai/Mistral-7B-Instruct-v0.2          │ ~16 GB   │ ← RTX 6000 Pro
#   │ microsoft/Phi-3.5-mini-instruct             │  ~9 GB   │
#   │ TinyLlama/TinyLlama-1.1B-Chat-v1.0          │  ~3 GB   │ CPU-safe
#   └─────────────────────────────────────────────┴──────────┘
#
generation:
  model_name: "mistralai/Mistral-7B-Instruct-v0.2"
  load_in_4bit: true                # QLoRA 4-bit NF4 — requires CUDA
  device_map: "auto"
  max_new_tokens: 256
  temperature: 0.1
  do_sample: false
  adapter_path: null                # set to outputs/qlora_model after training

# ── Diagnosis ────────────────────────────────────────────────
diagnosis:
  nli_model: "cross-encoder/nli-deberta-v3-base"
  nli_batch_size: 8
  entailment_threshold: 0.7
  contradiction_threshold: 0.6
  claim_min_length: 6               # min word count per claim
  claim_max_per_answer: 20

# ── Metrics ──────────────────────────────────────────────────
metrics:
  hallucination_lambda: 0.5         # λ weight in composite CHS
  scr_weight: 1.0
  conflict_weight: 1.0
  tve_weight: 0.8
  cdee_weight: 0.8

# ── Training ─────────────────────────────────────────────────
training:
  method: "dpo"                     # dpo | rejection | metric_loss
  output_dir: "outputs/qlora_model"
  num_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8    # effective batch = 16
  learning_rate: 2.0e-4
  fp16: true
  warmup_ratio: 0.05
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
  hallucination_penalty_lambda: 0.3
  dpo_beta: 0.1
  min_score_gap: 0.2               # min CHS gap for DPO pairs
  # Multi-sample data collection (for DPO)
  n_samples_per_query: 2
  collection_temperatures:
    - 0.1
    - 0.7

# ── Evaluation ───────────────────────────────────────────────
evaluation:
  datasets:
    - name: "hotpotqa"
      split: "validation"
      max_samples: 500
  results_dir: "outputs/eval"
  compare_baseline: true

# ── Paths ────────────────────────────────────────────────────
paths:
  log_dir: "outputs/logs"
  checkpoint_dir: "outputs/checkpoints"
  cache_dir: ".cache"